<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<body class="bg-gray-100">

<header class="sticky top-0 z-50 px-4 py-3 no-print transition-all duration-300 opacity-100">
  <div class="max-w-5xl mx-auto bg-slate-900/80 backdrop-blur-xl border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.3)] rounded-[24px] px-5 py-4">
    <div class="flex items-center justify-between">
      
      <div class="flex items-center gap-4">
        <div class="relative">
          <div class="absolute -inset-1 bg-gradient-to-tr from-emerald-400 to-cyan-400 rounded-full blur opacity-30 group-hover:opacity-100 transition duration-1000"></div>

            <img id="logoHeader" class="w-full h-full object-cover hidden" alt="Logo">
            <span id="logoPlaceholder" class="text-3xl">🎭</span>
          </div>
        </div>

        <div>
          <h1 id="namaGroupHeader" class="text-lg font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 uppercase leading-tight">

              KIDALANG NAMA
            </p>
          </div>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button onclick="showPage('settings')" class="group relative p-3 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/10 transition-all duration-300 active:scale-95">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
      </div>

    </div>
  </div>
 
</header>

<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md px-4 bg-white/5 backdrop-blur-2xl flex justify-around items-center py-3 border border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.1)] no-print z-50 rounded- transition-all duration-300 opacity-100">
  
  <button onclick="showPage('dashboard')" class="relative flex flex-col items-center group transition-all duration-300">
    <div class="p-2 rounded-2xl text-emerald-400 bg-emerald-400/10 mb-1 group-active:scale-90 transition-transform">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
    </div>
    <span class="text-[10px] font-bold text-white tracking-widest uppercase opacity-80">Beranda</span>
    <div class="absolute -top-1 w-1 h-1 bg-emerald-400 rounded-full shadow-[0_0_8px_#34d399]"></div>
  </button>

  <button onclick="showPage('input')" class="flex flex-col items-center group transition-all duration-300">
    <div class="p-2 rounded-2xl text-slate-400 group-hover:text-white group-hover:bg-white/5 mb-1 group-active:scale-90 transition-transform">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase group-hover:text-white/80 transition-colors">Input</span>
  </button>

  <button onclick="showPage('jadwal')" class="flex flex-col items-center group transition-all duration-300">
    <div class="p-2 rounded-2xl text-slate-400 group-hover:text-white group-hover:bg-white/5 mb-1 group-active:scale-90 transition-transform">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />

    <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase group-hover:text-white/80 transition-colors">Jadwal</span>
  </button>

  <button onclick="showPage('paketPage')" class="flex flex-col items-center group transition-all duration-300">
    <div class="p-2 rounded-2xl text-slate-400 group-hover:text-white group-hover:bg-white/5 mb-1 group-active:scale-90 transition-transform">

      </svg>

  </button>

</nav>
<button id="btnSuara" onclick="toggleSuara()" class="fixed bottom-20 right-4 bg-slate-800 text-white w-12 h-12 rounded-full shadow-lg text-xl active:scale-90 transition-all z-50">
 🔊
 </button>
<main class="p-4 space-y-6 bg-slate-50 min-h-screen">
  
  <section id="dashboard" class="page-section pb-24">
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-[24px] p-4 shadow-lg border border-white/5 relative overflow-hidden group">
        <div class="absolute -right-2 -top-2 opacity-10 group-hover:scale-110 transition-transform">🎭</div>
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Job</p>
        <h2 class="text-3xl font-black text-white mt-1" id="totalJob">0</h2>
      </div>
      <div class="bg-white rounded-[24px] p-4 shadow-sm border border-slate-200 relative overflow-hidden group">
        <div class="absolute -right-2 -top-2 opacity-10 group-hover:scale-110 transition-transform text-emerald-600">💰</div>
        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Pendapatan</p>
        <h2 class="text-xl font-black text-emerald-600 mt-1" id="totalIncome">Rp 0</h2>
      </div>
    </div>

    <div class="relative mb-6">
      <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
      </span>
      <input type="text" id="cariJadwal" onkeyup="filterJadwal()" placeholder="Cari penanggap utawa lakon..." class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white border-none shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all placeholder:text-slate-400 text-slate-700 font-medium">
    </div>

    <div class="bg-white rounded-[32px] p-5 shadow-sm border border-slate-100">
      <div class="flex items-center justify-between mb-4 px-1">
        <h3 class="font-bold text-slate-800 flex items-center gap-2">
          <span class="w-1.5 h-6 bg-emerald-500 rounded-full"></span>
          Daftar Job
        </h3>
        <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded-lg font-bold">TERBARU</span>
      </div>
      <div id="jobList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scroll">
        </div>
    </div>
  </section>

  <section id="input" class="page-section hidden pb-24">
    <div class="bg-white rounded-[32px] p-6 shadow-xl border border-slate-100 space-y-4">
      <div class="text-center mb-2">
        <h3 class="font-black text-slate-800 text-xl uppercase tracking-tight">Tambah Job Anyar</h3>
        <p class="text-xs text-slate-500 font-medium">Input rincian tanggapan kanthi teliti</p>
      </div>
      
      <div class="space-y-3">
        <div class="group">
          <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase tracking-widest">Data Utama</label>
          <input id="nama" placeholder="Nama Penanggap / Klien" class="w-full p-3.5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-medium">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <input id="acara" placeholder="Jenis Acara" class="w-full p-3.5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-medium">
          <input id="lakon" placeholder="Lakon / Judul" class="w-full p-3.5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-medium">
        </div>
        <input id="tanggal" type="date" class="w-full p-3.5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-medium text-slate-600">
        
        <div class="grid grid-cols-2 gap-3">
          <div class="relative">
            <span class="absolute left-3 top-3.5 text-slate-400 text-sm font-bold">Rp</span>
            <input id="harga" placeholder="Total" type="number" class="w-full p-3.5 pl-10 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-bold">
          </div>
          <div class="relative">
            <span class="absolute left-3 top-3.5 text-emerald-500 text-sm font-bold">Rp</span>
            <input id="dp" placeholder="Panjer" type="number" class="w-full p-3.5 pl-10 bg-emerald-50/50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-bold text-emerald-700">
          </div>
        </div>

        <input id="lokasi" placeholder="Lokasi / Alamat Lengkap" class="w-full p-3.5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-medium">
        
        <select id="paketSelect" class="w-full p-3.5 bg-slate-100 border-none rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-slate-700 appearance-none">
          <option value="">-- Pilih Paket Master --</option>
        </select>
      </div>

      <button onclick="tambahJob()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white p-4 rounded-2xl font-black shadow-[0_10px_20px_rgba(16,185,129,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
        SIMPAN JOB ANYAR
      </button>
    </div>
  </section>

  <section id="jadwal" class="page-section hidden pb-24">
    <div class="bg-white rounded-[32px] p-5 shadow-sm border border-slate-100">
      <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
        <span class="w-1.5 h-6 bg-orange-400 rounded-full"></span>
        Jadwal Mendatang
      </h3>
      <div id="jadwalList" class="space-y-3 max-h-[600px] overflow-y-auto custom-scroll"></div>
    </div>
  </section>

  <section id="settings" class="page-section hidden pb-24">
    <div class="bg-white rounded-[32px] p-6 shadow-sm space-y-6">
      <div>
        <h3 class="font-bold text-slate-800 text-lg border-b border-slate-100 pb-3">Profil Header Kwitansi</h3>
        <div class="grid gap-3 mt-4">
          <input id="namaDalang" placeholder="Nama Dalang" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-500">
          <input id="namaGroup" placeholder="Nama Group" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-500">
          <textarea id="alamat" placeholder="Alamat Lengkap" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
          <input id="noHp" placeholder="Nomor HP / WA" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-500">
          <input id="logo" placeholder="URL Logo (ImgBB/Liyane)" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-500">
          <button onclick="simpanSetting()" class="bg-slate-800 text-white p-3.5 rounded-xl font-bold hover:bg-black transition-colors">Simpan Perubahan</button>
        </div>
      </div>

      <div class="pt-4 space-y-3">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">Manajemen Data</p>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="backupData()" class="bg-emerald-50 text-emerald-700 font-bold py-3 rounded-xl text-xs hover:bg-emerald-100 transition-colors flex items-center justify-center gap-2">
            📥 BACKUP
          </button>
          <label class="cursor-pointer bg-slate-50 text-slate-700 font-bold py-3 rounded-xl text-xs text-center border-2 border-dashed border-slate-200 hover:bg-slate-100 transition-colors">
            📤 RESTORE <input type="file" class="hidden" onchange="restoreData(event)">
          </label>
        </div>
        <button onclick="resetJadwalSaja()" class="w-full bg-red-50 text-red-500 font-bold py-3 rounded-xl text-xs hover:bg-red-100 transition-colors uppercase tracking-tight">
          Kosongne Kabeh Data
        </button>
      </div>
    </div>
  </section>

  <section id="paketPage" class="page-section hidden pb-24">
    <div class="bg-white rounded-[32px] p-6 shadow-sm space-y-6">
      <div class="flex items-center justify-between border-b border-slate-100 pb-4">
        <h3 class="font-bold text-lg text-slate-800">Manajemen Paket</h3>
        <span class="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-1 rounded-full font-black">MASTER</span>
      </div>
      
      <div class="space-y-3 bg-slate-50 p-4 rounded-[24px] border border-slate-100">
          <input id="paketNama" placeholder="Nama Paket (e.g. Paket Komplit)" class="w-full p-3 bg-white rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-500 font-bold">
          <textarea id="paketIsi" placeholder="Rincian (Wayang, Sound, Terop, lsp)" class="w-full p-3 bg-white rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-500 h-24 text-sm"></textarea>
          <button onclick="tambahPaket()" class="bg-emerald-600 text-white p-3.5 rounded-xl w-full font-bold shadow-md">TAMBAH PAKET</button>
      </div>
      
      <div id="paketList" class="flex overflow-x-auto gap-4 pb-4 px-2 custom-scroll outline-none">
        </div>
    </div>
  </section>
</main>

<div id="modalDetail" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-[60] items-center justify-center p-4 transition-all duration-300">
  <div class="bg-white rounded-[40px] w-full max-w-sm overflow-hidden shadow-2xl transform scale-100 border border-white/20">
    <div class="bg-gradient-to-r from-slate-800 to-slate-900 p-6 text-white relative">
      <h3 class="font-black text-xl uppercase tracking-tighter">Detail Job</h3>
      <p class="text-xs text-slate-400">Informasi Lengkap Tanggapan</p>
      <button onclick="tutupModalDetail()" class="absolute top-6 right-6 p-2 bg-white/10 rounded-full hover:bg-white/20">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="isiDetail" class="p-6 space-y-4 max-h-[60vh] overflow-y-auto custom-scroll"></div>
    <div class="p-6 bg-slate-50">
      <button onclick="tutupModalDetail()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-emerald-200">OKEY, SIAP!</button>
    </div>
  </div>
</div>

<script>
let jobs = JSON.parse(localStorage.getItem('jobs') || '[]');
let setting = JSON.parse(localStorage.getItem('setting') || '{}');
let paket = JSON.parse(localStorage.getItem('paket') || '[]');

function msg(t, type="success") {
  Toastify({
    text: t, duration: 3000, gravity: "top", position: "right",
    style: { background: type === "success" ? "#0d9488" : "#ef4444", borderRadius: "10px" }
  }).showToast();
}

function showPage(id) {
  document.querySelectorAll('.page-section').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function simpanSetting() {
  setting = {
    namaDalang: document.getElementById('namaDalang').value,
    namaGroup: document.getElementById('namaGroup').value,
    alamat: document.getElementById('alamat').value,
    noHp: document.getElementById('noHp').value,
    logo: document.getElementById('logo').value
  };
  localStorage.setItem('setting', JSON.stringify(setting));
  render();
  msg("Setting Profil wis mancep!");
}

function tambahJob() {
  const n = document.getElementById('nama'), 
        a = document.getElementById('acara'), 
        lk = document.getElementById('lakon'),
        t = document.getElementById('tanggal'), 
        h = document.getElementById('harga'), 
        d = document.getElementById('dp'), 
        l = document.getElementById('lokasi'),
        ps = document.getElementById('paketSelect');

  if(!n.value || !t.value) return msg("Nama lan Tanggal kudu diisi!", "error");

  const newJob = {
    id: Date.now(),
    nama: n.value,
    acara: a.value, // Isine Sunatan / Mantu (ketikanmu)
    paket_nama: ps.options[ps.selectedIndex].text, // Jeneng Pakete
    paket_isi: ps.value, // Rincian Isine Paket (Wayang, Sound, lsp)
    lakon: lk.value,
    tanggal: t.value,
    harga: parseInt(h.value) || 0,
    dp: parseInt(d.value) || 0,
    sisa: (parseInt(h.value) || 0) - (parseInt(d.value) || 0),
    lokasi: l.value
  };

  jobs.push(newJob);
  localStorage.setItem('jobs', JSON.stringify(jobs));
  
  [n, a, lk, t, h, d, l].forEach(i => i.value = '');
  ps.selectedIndex = 0;
  
  msg("Job Berhasil Disimpan!");
  render();
  showPage('dashboard');
}

function render() {
  // Update Header
  document.getElementById('namaGroupHeader').innerText = setting.namaGroup || 'NAMA GROUP';
  document.getElementById('namaDalangHeader').innerText = setting.namaDalang || 'NAMA DALANG';
  if(setting.logo) {
    document.getElementById('logoHeader').src = setting.logo;
    document.getElementById('logoHeader').classList.remove('hidden');
    document.getElementById('logoPlaceholder').classList.add('hidden');
  }

  // Dashboard Stats
  document.getElementById('totalJob').innerText = jobs.length;
  let total = jobs.reduce((a, b) => a + (b.harga || 0), 0);
  document.getElementById('totalIncome').innerText = 'Rp ' + total.toLocaleString();

  // Dashboard List (Modern Card Version)
  document.getElementById('jobList').innerHTML = jobs.map((j, i) => `
    <div class="relative bg-white rounded-[24px] p-4 shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-slate-100 transition-all duration-300">
      <div class="absolute top-4 right-4">
        ${j.sisa <= 0 
          ? '<span class="flex h-2 w-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></span>' 
          : '<span class="flex h-2 w-2 rounded-full bg-amber-400 animate-pulse"></span>'}
      </div>

      <div class="flex flex-col gap-3">
        <div onclick="bukaDetailByJobId(${j.id})" class="cursor-pointer space-y-1">
          <span class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">${j.acara}</span>
          <b class="text-lg font-extrabold text-slate-900 block leading-tight uppercase">${j.nama}</b>
          <div class="flex items-center gap-2 mt-2">
            <span class="bg-slate-100 px-2 py-0.5 rounded-md text-[10px] font-bold text-slate-500">📅 ${j.tanggal}</span>
            <span class="bg-amber-50 px-2 py-0.5 rounded-md text-[10px] font-bold text-amber-700">🎭 ${j.lakon || '-'}</span>
          </div>
        </div>

        <div class="bg-slate-50 rounded-2xl p-3 flex justify-between items-center border border-slate-100/50">
          <div>
            <p class="text-[9px] font-bold text-slate-400 uppercase">Total</p>
            <b class="text-sm font-black text-slate-800">Rp ${(j.harga || 0).toLocaleString()}</b>
          </div>

function backupData() {
  const d = { jobs, setting, paket };
  const blob = new Blob([JSON.stringify(d)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `Backup_Dalang_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function restoreData(e) {
  const f = e.target.files[0];
  const r = new FileReader();
  r.onload = function(ex) {
    const d = JSON.parse(ex.target.result);
    localStorage.setItem('jobs', JSON.stringify(d.jobs));
    localStorage.setItem('setting', JSON.stringify(d.setting));
    localStorage.setItem('paket', JSON.stringify(d.paket));
    location.reload();
  };
  r.readAsText(f);
}

let suaraAktif = localStorage.getItem('suaraAktif')!== 'false';

function bunyiKlik() {
  if (!suaraAktif) return;

  // Fix error AudioContext di Safari
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const audioContext = new AudioCtx();
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();

  oscillator.type = 'square';
  oscillator.frequency.setValueAtTime(1000, audioContext.currentTime);
  gainNode.gain.setValueAtTime(0.1, audioContext.currentTime); // Tak cilikne sithik

  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);

  oscillator.start();
  oscillator.stop(audioContext.currentTime + 0.05); // Tak pendekne ben 'klik'
}

              // Nek SW anyar wes di-install & siap ngenteni
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // Kene iso gawe toast, ojo confirm ben ra ngganggu
                // Tapi nek pengen simple, confirm wae
                if (confirm('Ono update anyar mas bos. Reload sek ben entuk fitur anyar?')) {
                  newWorker.postMessage({ action: 'skipWaiting' });
                }
              }
            });
          });
        })
        .catch(err => console.log('SW Gagal Ndhaptar:', err));


      let refreshing;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        window.location.reload();
        refreshing = true;
      });
    });
  }

  let navBar = document.querySelector('nav');
let headerBar = document.querySelector('header');
let timerNgumpet;

function umpetkeBar() {
  // NAV MUDUN
  navBar.style.transform = 'translate(-50%, 150%)';
  navBar.style.opacity = '0';
  
  // HEADER MUNGGAH - ojo lali translateY tok mergo header raono translateX
  headerBar.style.transform = 'translateY(-100%)';
  headerBar.style.opacity = '0';
}

function jedulkeBar() {
  clearTimeout(timerNgumpet);
  
  // NAV BALIK
  navBar.style.transform = 'translate(-50%, 0%)';
  navBar.style.opacity = '1';
  
  // HEADER BALIK
  headerBar.style.transform = 'translateY(0%)';
  headerBar.style.opacity = '1';
  
  // Setel timer: 3 detik meneng, umpet maneh
  timerNgumpet = setTimeout(umpetkeBar, 3000);
}

// Saben user ndemek layar, reset timer + jedulke
['touchstart', 'mousemove', 'click', 'scroll'].forEach(evt => {
  document.addEventListener(evt, jedulkeBar);
});

// Pertama load langsung setel
jedulkeBar();


</script>
</body>
</html>
